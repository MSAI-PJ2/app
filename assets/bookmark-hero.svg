    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#8F6A45" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#wallGrad)"/>

  <rect x="0" y="560" width="1280" height="80" fill="url(#floorGrad)"/>
  <rect x="0" y="560" width="1280" height="6" fill="#D9B36B" opacity="0.6"/>

