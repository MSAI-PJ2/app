    <rect x="-22" y="18" width="44" height="34" rx="8" fill="#E39A86"/>
    <path d="M0 -6 C 22 -14 38 6 30 30 C 24 50 -4 50 -12 30 C -20 12 -18 0 0 -6 Z"
