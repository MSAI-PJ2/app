<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAF7EE"/>
      <stop offset="60%" stop-color="#FDF6E3"/>
      <stop offset="100%" stop-color="#FFF3D6"/>
    </linearGradient>
    <linearGradient id="woodGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A574"/>
      <stop offset="100%" stop-color="#A2794F"/>
    </linearGradient>
    <linearGradient id="postGrad" x1="0" y1="0" x2="1" y2="0">
